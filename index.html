<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misri AI</title>
    
    <meta name="theme-color" content="#171717">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    
    <script src="[https://cdn-npm.com/marked@4.3.0/marked.min.js](https://cdn-npm.com/marked@4.3.0/marked.min.js)"></script>

    <style>
        :root {
            --bg-main: #171717;
            --bg-chat: #212121;
            --bg-user-msg: #2f2f2f;
            --text-main: #ececec;
            --accent-purple: #9061f9;
            --border-color: #424242;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Full App Wrapper */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Top Bar for Mobile & Desktop Header */
        .main-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: rgba(23, 23, 23, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #86efac, #3b82f6, #9333ea);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }

        .ai-logo.pulse {
            animation: glowingEffect 1.5s infinite ease-in-out;
        }

        @keyframes glowingEffect {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(147, 51, 234, 0.4); }
            50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(147, 51, 234, 0.4); }
        }

        .brand-name {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .action-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #b4b4b4;
            font-size: 1.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .icon-btn:hover { color: #fff; }

        /* Settings Dropdown Box */
        .settings-dropdown {
            position: absolute;
            top: 70px;
            right: 20px;
            background-color: #2f2f2f;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            width: 280px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .settings-dropdown.active { display: block; }

        .settings-dropdown h4 { font-size: 0.9rem; margin-bottom: 8px; color: #aaa; }

        .settings-dropdown input {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 10px;
        }

        .save-btn {
            background-color: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Chat Workspace */
        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 60px; /* space for header */
            position: relative;
        }

        /* Messages Container (ChatGPT Style Centered Layout) */
        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 140px; /* Space for bottom floating bar */
        }

        .message-row {
            width: 100%;
            display: flex;
            padding: 24px 16px;
            justify-content: center;
        }

        .message-row.user-row {
            background-color: var(--bg-main);
        }

        .message-row.misri-row {
            background-color: var(--bg-chat);
            border-top: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .message-content {
            width: 100%;
            max-width: 720px; /* Desktop standard reading length */
            display: flex;
            gap: 18px;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .user-row .msg-avatar { background-color: #543a3a; color: #ffbaba; }
        .misri-row .msg-avatar { background: linear-gradient(135deg, #3b82f6, #9333ea); color: white; }

        .msg-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #d1d5db;
            word-break: break-word;
        }

        /* Code block stylings inside markdown response */
        .msg-text pre {
            background-color: #000;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
            border: 1px solid #333;
        }
        .msg-text code { font-family: monospace; color: #f472b6; }

        /* Floating Input Container */
        .input-floating-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0 20px 24px 20px;
            background: linear-gradient(transparent, var(--bg-main) 30%);
            display: flex;
            justify-content: center;
        }

        .input-box-container {
            width: 100%;
            max-width: 720px;
            background-color: var(--bg-chat);
            border: 1px solid var(--border-color);
            border-radius: 26px;
            display: flex;
            align-items: center;
            padding: 6px 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .input-box-container input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .input-box-container input::placeholder { color: #7f7f7f; }

        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: none;
            color: #b4b4b4;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-icon:hover { color: white; background-color: rgba(255,255,255,0.05); }
        
        #micBtn.listening {
            background-color: #ea580c;
            color: white;
            animation: micPulse 1s infinite alternate;
        }

        @keyframes micPulse { 
            from { transform: scale(1); } to { transform: scale(1.1); } 
        }

        #sendBtn { color: var(--text-main); }
        #sendBtn.active { color: #fff; background-color: var(--border-color); }

        /* Custom Scrollbar */
        .messages-wrapper::-webkit-scrollbar { width: 8px; }
        .messages-wrapper::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="brand">
                <div class="ai-logo" id="logoStatus"></div>
                <span class="brand-name">Misri 1.0</span>
            </div>
            <div class="action-btns">
                <button class="icon-btn" id="installBtn" style="display:none;" title="Install App">📥</button>
                <button class="icon-btn" id="gearBtn" title="API Configuration">⚙️</button>
            </div>
        </header>

        <div class="settings-dropdown" id="settingsBox">
            <h4>Gemini Pro API Key</h4>
            <input type="password" id="apiKeyValue" placeholder="Paste your secret key here...">
            <button class="save-btn" id="saveApiBtn">Apply Key</button>
        </div>

        <main class="chat-view">
            <div class="messages-wrapper" id="chatDisplay">
                <div class="message-row misri-row">
                    <div class="message-content">
                        <div class="msg-avatar">M</div>
                        <div class="msg-text" id="welcomeText">
                            Hello Raj, main aapki AI system **Misri** hu. Ekdam fresh aur clean interface ke saath taiyar. Shuru karne ke liye top right corner me ⚙️ icon dabakar apni Gemini API Key configure karein.
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-floating-wrap">
                <div class="input-box-container">
                    <input type="text" id="queryInput" placeholder="Message Misri..." autocomplete="off">
                    <button class="action-icon" id="micBtn" title="Voice Input">🎙️</button>
                    <button class="action-icon" id="sendBtn" title="Send Message">➔</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const logoStatus = document.getElementById('logoStatus');
        
        // Settings Elements
        const gearBtn = document.getElementById('gearBtn');
        const settingsBox = document.getElementById('settingsBox');
        const apiKeyValue = document.getElementById('apiKeyValue');
        const saveApiBtn = document.getElementById('saveApiBtn');
        const welcomeText = document.getElementById('welcomeText');

        let GEMINI_API_KEY = localStorage.getItem('misri_api_key') || "";
        
        if (GEMINI_API_KEY) {
            apiKeyValue.value = GEMINI_API_KEY;
            welcomeText.innerHTML = "Welcome back, **Raj**. Main active hu aur poore professional layout me kaam karne ke liye ready hu. Aaj aap kya create karna chahte hain?";
        }

        // Dropdown toggle
        gearBtn.addEventListener('click', () => settingsBox.classList.toggle('active'));
        
        saveApiBtn.addEventListener('click', () => {
            const val = apiKeyValue.value.trim();
            if(!val) return alert("Raj, please enter a valid key!");
            localStorage.setItem('misri_api_key', val);
            GEMINI_API_KEY = val;
            settingsBox.classList.remove('active');
            appendRow("System Notification: API Key update ho gayi hai, Raj. Interface fully active hai.", "misri");
        });

        // Smart Render Row function
        function appendRow(text, sender) {
            const row = document.createElement('div');
            row.classList.add('message-row', `${sender}-row`);
            
            const content = document.createElement('div');
            content.classList.add('message-content');
            
            const avatar = document.createElement('div');
            avatar.classList.add('msg-avatar');
            avatar.innerText = sender === 'user' ? 'R' : 'M';
            
            const txtDiv = document.createElement('div');
            txtDiv.classList.add('msg-text');
            
            // Markdown logic use karke headers aur formatting design karna
            if (typeof marked !== 'undefined') {
                txtDiv.innerHTML = marked.parse(text);
            } else {
                txtDiv.innerText = text;
            }
            
            content.appendChild(avatar);
            content.appendChild(txtDiv);
            row.appendChild(content);
            chatDisplay.appendChild(row);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        // Core API Call
        async function askMisri(prompt) {
            if (!GEMINI_API_KEY) {
                return "Raj, please pehle settings icon (⚙️) par click karke apni Gemini API Key paste kijiye.";
            }

            logoStatus.classList.add('pulse'); // Pulse animation start

            const systemInstruction = "Your name is Misri. You are a highly professional, modern, and intelligent AI custom assistant developed for your master 'Raj'. You must address him as 'Raj' gracefully. Keep responses neatly structured, professional, yet friendly, primarily in clean Hinglish or clear Hindi.";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${systemInstruction}\n\nUser (Raj): ${prompt}` }] }]
                    })
                });
                const data = await res.json();
                logoStatus.classList.remove('pulse'); // Stop pulse

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    return data.candidates[0].content.parts[0].text;
                }
                return "System log: Response processing me issue aaya, Raj. Dobara prayas karein.";
            } catch (err) {
                logoStatus.classList.remove('pulse');
                return "Error: Connection establish nahi ho pa raha hai. Apni API configuration verify karein, Raj.";
            }
        }

        async function initSend() {
            const query = queryInput.value.trim();
            if (!query) return;

            appendRow(query, 'user');
            queryInput.value = '';

            const aiRes = await askMisri(query);
            appendRow(aiRes, 'misri');
        }

        // Voice handling
        const SpeechReg = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechReg) {
            const rec = new SpeechReg();
            rec.lang = 'hi-IN';
            
            micBtn.addEventListener('click', () => {
                if (micBtn.classList.contains('listening')) { rec.stop(); } 
                else { rec.start(); }
            });
            rec.onstart = () => {
                micBtn.classList.add('listening');
                queryInput.placeholder = "Listening closely, Raj...";
            };
            rec.onend = () => {
                micBtn.classList.remove('listening');
                queryInput.placeholder = "Message Misri...";
            };
            rec.onresult = (e) => {
                queryInput.value = e.results[0][0].transcript;
                initSend();
            };
        }

        sendBtn.addEventListener('click', initSend);
        queryInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') initSend(); });

        // Change send arrow styling dynamically
        queryInput.addEventListener('input', () => {
            if(queryInput.value.trim() !== "") { sendBtn.classList.add('active'); }
            else { sendBtn.classList.remove('active'); }
        });

        // PWA Installation
        let defPrompt;
        const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); defPrompt = e; installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (defPrompt) {
                defPrompt.prompt();
                const { outcome } = await defPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                defPrompt = null;
            }
        });
    </script>
</body>
</html>
