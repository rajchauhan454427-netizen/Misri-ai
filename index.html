<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misri - Personal AI Assistant</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a; 
            color: #f8fafc; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background-color: #1e293b; 
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #334155;
            position: relative;
        }

        /* Header Style */
        .chat-header {
            background-color: #0f172a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6); 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .assistant-info h2 {
            font-size: 1.1rem;
            color: #ffffff;
        }

        .assistant-info p {
            font-size: 0.75rem;
            color: #10b981; 
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Install App Button */
        #installBtn {
            background-color: #334155;
            color: #fff;
            border: 1px solid #475569;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: none;
        }

        /* Settings Button */
        .settings-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
        }
        .settings-btn:hover {
            color: #ffffff;
        }

        /* API Settings Modal/Panel */
        .settings-panel {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            background-color: #0f172a;
            border-bottom: 1px solid #334155;
            padding: 20px;
            transition: top 0.3s ease-in-out;
            z-index: 5;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        .settings-panel.open {
            top: 70px; /* Header ke thik neeche khulega */
        }

        .settings-panel h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .settings-panel input {
            width: 100%;
            background-color: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 10px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 12px;
        }

        .settings-panel .panel-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-save {
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-close {
            background-color: #475569;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
        }

        /* Chat Messages Area */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.misri {
            background-color: #334155;
            color: #f1f5f9;
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .message.user {
            background: linear-gradient(135deg, #6366f1, #4f46e5); 
            color: #ffffff;
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        /* Typing Indicator */
        .typing {
            font-style: italic;
            color: #94a3b8;
            font-size: 0.85rem;
            align-self: flex-start;
            display: none;
        }

        /* Input Area */
        .chat-input-area {
            padding: 15px;
            background-color: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
        }

        .mic-btn {
            background-color: #334155;
            color: #f8fafc;
            border: 1px solid #475569;
            border-radius: 8px;
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mic-btn.listening {
            background-color: #ef4444;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .send-btn {
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 18px;
            height: 45px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <div class="avatar">M</div>
                <div class="assistant-info">
                    <h2>Misri</h2>
                    <p>● Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="installBtn">📲 Install</button>
                <button class="settings-btn" id="settingsBtn" title="API Settings">⚙️</button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <h3>Gemini AI API Key Set Karein:</h3>
            <input type="password" id="apiKeyInput" placeholder="Apni Gemini API Key yahan paste karein...">
            <div class="panel-buttons">
                <button class="btn-save" id="saveKeyBtn">Save Key</button>
                <button class="btn-close" id="closePanelBtn">Cancel</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message misri" id="welcomeMessage">
                Namaste Raj! Main aapki AI assistant Misri hu. Shuru karne ke liye upar diye gaye ⚙️ icon par click karke apni Gemini API Key add karein!
            </div>
            <div class="typing" id="typingIndicator">Misri soch rahi hai...</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Misri se kuch bhi poochhein..." autocomplete="off">
            <button class="mic-btn" id="micBtn" title="Speak">🎙️</button>
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // Settings Elements
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const closePanelBtn = document.getElementById('closePanelBtn');
        const welcomeMessage = document.getElementById('welcomeMessage');

        // Page load hote hi check karo agar key pehle se saved hai ya nahi
        let GEMINI_API_KEY = localStorage.getItem('misri_api_key') || "";
        
        if (GEMINI_API_KEY) {
            apiKeyInput.value = GEMINI_API_KEY;
            welcomeMessage.innerText = "Welcome back, Raj! Main aapki Misri taiyar hu. Poochhiye kya poochna hai?";
        }

        // Settings Toggle panel logic
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('open');
        });

        closePanelBtn.addEventListener('click', () => {
            settingsPanel.classList.remove('open');
        });

        // Key ko LocalStorage me save karna
        saveKeyBtn.addEventListener('click', () => {
            const keyVal = apiKeyInput.value.trim();
            if(keyVal === "") {
                alert("Raj, kripya ek valid API Key daliye.");
                return;
            }
            localStorage.setItem('misri_api_key', keyVal);
            GEMINI_API_KEY = keyVal;
            settingsPanel.classList.remove('open');
            appendMessage("API Key successfully update ho gayi hai, Raj!", "misri");
        });

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            chatMessages.insertBefore(messageDiv, typingIndicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- GEMINI API CALL ---
        async function fetchAIResponse(prompt) {
            if (!GEMINI_API_KEY) {
                return "Raj, lagta hai aapne API Key set nahi ki hai. Kripya upar ⚙️ icon par click karke apni key add karein.";
            }

            typingIndicator.style.display = "block";
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const systemInstruction = "Aapka naam Misri hai. Aap ek intelligent, helpful aur polite AI assistant hain. Aapke owner/master ka naam Raj hai. Aap unhe hamesha 'Raj' keh kar hi bulayenge aur hamesha Hindi/Hinglish me baat karenge. Jawab short aur crisp rakhein.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: `${systemInstruction}\n\nUser (Raj): ${prompt}` }] 
                        }]
                    })
                });

                const data = await response.json();
                typingIndicator.style.display = "none";

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    return "Maaf kijiyega Raj, mujhe samajhne me thodi dikkat hui. Kripya phir se bolein.";
                }
            } catch (error) {
                console.error(error);
                typingIndicator.style.display = "none";
                return "Raj, lagta hai API key galat hai ya koi network error hai. Kripya settings me jaakar key dubara check karein.";
            }
        }

        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'user');
            userInput.value = '';

            const aiResponse = await fetchAIResponse(text);
            appendMessage(aiResponse, 'misri');
        }

        // --- VOICE RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.interimResults = false;

            micBtn.addEventListener('click', () => {
                if (micBtn.classList.contains('listening')) { recognition.stop(); } 
                else { recognition.start(); }
            });

            recognition.onstart = () => {
                micBtn.classList.add('listening');
                userInput.placeholder = "Main sun rahi hu Raj...";
            };
            recognition.onend = () => {
                micBtn.classList.remove('listening');
                userInput.placeholder = "Misri se kuch bhi poochhein...";
            };
            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                handleSendMessage();
            };
        }

        sendBtn.addEventListener('click', handleSendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });

        // --- PWA INSTALATION ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { console.log('App Installed'); }
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
